[pytest]
minversion = 7.0
pythonpath = .
testpaths = tests
addopts = -ra --strict-markers
log_cli = false
markers =
    employees: Module 1 — employee directory specs
    tickets: Module 2 — IT ticket specs
    integration: Module 3 — integration / admin specs
    audit: audit-log specs
    positive: happy-path scenarios
    negative: error / validation scenarios
    contract: response status + body schema checks
    auth: authentication / authorization scenarios
    boundary: boundary / limit scenarios
    smoke: minimal smoke checks
    req: traceability marker; args are requirement/invariant IDs (e.g. @req("FR-T11", "INV-P5"))
